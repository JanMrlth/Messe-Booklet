node12:
  title: Taufwasserweihe
  pairs:
  - latin: 'Pr. Dominus vobiscum.

      A. Et cum spiritu tuo.'
    german: 'Pr. Der Herr sei mit euch.

      A. Und mit deinem Geiste'
  - latin: 'Oremus. Omnipotens sempiterne Deus, adesto magnae pietatis tuae mysteriis, adesto sacramentis: et ad recreandos
      novos populos, quos tibi fons baptismatis parturit, spiritum adoptionis emitte; ut, quod nostrae humilitatis gerendum
      est ministerio, virtutiss tuae impleatur effectu. Per Dominum nostrum, Iesum Christum, filium tuum, qui tecum vivit
      et regnat in unitate Spiritus Sancti Deus: Per omnia saecula saeculorum. A Amen.'
    german: 'Lasset uns beten. Allmächtiger, ewiger Gott, sei hilfreich zugegen den Mysterien Deiner göttlichen Huld, sei
      zugegen dem Vollzug Deiner Sakramente! Sende aus den Geist der Kindschaft: Er möge erschaffen ein neues Volk, Dir geboren
      aus dem Brunnen der Taufe; und was nun geschehen soll im priesterlichen Dienste, getan in unserer Schwachheit, das lasse
      Wirklichkeit werden durch Deine Kraft. Durch unsern Herrn Jesus Christus, Deinen Sohn, der mit Dir lebt und herrscht
      in der Einheit des Heiligen Geistes, Gott von Ewigkeit zu Ewigkeit. Amen.'
  - latin: 'Pr. Dominus vobiscum.

      A. Et cum spiritu tuo.

      Pr. Sursum corda.

      A. Habemus ad Dominum.

      Pr. Gratias agamus Domino Deo nostro.

      A. Dignum et iustum est.'
    german: 'Pr. Der Herr sei mit euch.

      A. Und mit deinem Geiste

      Pr. Erhebet die Herzen

      A. Wir haben sie beim Herrn.

      Pr. Dank laßt uns sagen dem Herrn, unserm Gott.

      A. Würdig ist es und recht.'
  - latin: 'Vere dignum et iustum est, aequum et salutare, nos tibi semper et ubique gratias agere, Domine, sancte Pater,
      omnipotens aeterne Deus: qui invisibili potentia, sacramentorum tuorum mirabiliter operaris effectum: et licet nos tantis
      mysteriis exsequendis simus indigni: tu tamen gratiae tuae dona non deserens, etiam ad nostras preces aures tuae pietatis
      inclinas.

      Deus, cuius Spiritus super aquas inter ipsa munda primordia ferebatur: ut iam tunc virtutem sanctificationis, aquarum
      natura conciperet. Deus, qui nocentis mundi crimina per aquas abluens, regenerationis speciem in ipsa diluvii effusione
      signasti: ut, unius eiusdemque elementi mysterio, et finis esset vitiis, et origo virtutibus. Respice, Domine, in faciem
      Ecclesiae tuae, et multiplica in ea regenerationes tuas, qui gratiae tuae affluentis impetu laetificas civitatem tuam:
      fontemque baptismatis aperis toto orbe terrarum gentibus innovandis: ut, tuae maiestatis imperio, sumat Unigeniti tui
      gratiam de Spiritu Sancto.'
    german: 'In Wahrheit ist es würdig und recht, billig und heilsam, immer und überall Dank zu sagen Dir, o Herr, heiliger
      Vater, allmächtiger, ewiger Gott: der Du mit unsichtbarer Kraft Deine Sakra­mente wirksam machest. Wohl sind wir nicht
      würdig, so hohe Geheimnisse zu vollziehen, Du aber willst nicht ferne bleiben den Geschenken Deiner Gnade und neigest
      unsern Bitten gütig Dein Ohr. O Gott, dessen Geist über den Wassern schwebte am Anfang der Welt, auf daß die Natur des
      Wassers schon damals die Kraft empfange, heilig zu machen: 0 Gott, der Du unsere Wiederge­burt vorgebildet hast in den
      Wogen der Sintflut, der Du ab­gewaschen die Schuld der sündigen Welt in den Wassern, auf daß im Geheimnis dieses einen
      Elementes Untergang sei für die Sünde, für die Tugend ein neuer Beginn: Blicke, o Herr, in das Angesicht Deiner Kirche
      und mache zahlreich in ihr die Wun­der Deiner Wiedergeburt! Er­freuest Du doch Deine Stadt mit dem mächtigen Strom Deiner
      Gnade und öffnest den Brunnen der Taufe, um neu zu schaffen alle Völker der Erde. Laß die­sen Brunnen auf das Wort Dei­ner
      Majestät die Gnade Deines Eingeborenen empfangen vom Heiligen Geiste.'
  - latin: 'Qui hanc aquam, regenerandis hominibus praeparatam, arcana sui numinis admixtione fecundet: ut, sanctificatione
      concepta, ab immaculato divini fontis utero, in novam renata creaturam, progenies caelestis emergat: et quos aut sexus
      in corpore, aut aetas discernit in tempore, omnes in unam pariat gratia mater infantiam. Procul ergo hinc, iubente te,
      Domine, omnis spiritus immundus abscedat: procul tota neqitia diabolicae fraudis absistat. Nihil hoc loci habeat contrariae
      virtutis admixtio: non insidiando cicumvolet: non latendo subrepat: non inficiendo corrumpat.'
    german: Dieses Wasser hier, bereitet für die Wiedergeburt der Menschen, es werde befruchtet vom Hei­ligen Geist durch
      die geheimnis­volle Mitteilung Seines göttlichen Odems. Es empfange die Kraft, um heilig zu machen, und aus dem makellosen
      Mutterschoße des göttlichen Brunnens steige empor ein himmlisches Volk, zu neuen Geschöpfen geboren. Und seien sie auch
      verschieden nach Geschlecht und nach Alter, zu gleicher Kindheit gebäre als Mut­ter sie alle die Gnade. Fernab weiche
      von hier auf Deinen Be­fehl, o Herr, jeder unreine Geist; weithin fliehe alle Bosheit teuf­lischen Truges. Keinen Raum
      habe hier die Einwirkung feind­licher Macht, nicht kreise sie lau­ernd umher, nicht schleiche sie heimlich heran, mit
      ihrem Gifthauch verderbe sie nicht.
  - latin: 'Sit haec sancta et innocens creatura, libera ab omni impugnatoris incursu, et totius nequitiae purgata discessu.
      Sit fons vivus, aqua regenerans, unda purificans: ut omnes hoc lavacro salutifero diluendi, operante in eis Spiritu
      Sancto, perfectae purgationis indulgentiam consequantur.'
    german: Dieses Wasser, geschaffen von Gott, sie heilig und sündelos; von jedem Ansturm des Widersachers befreit; rein
      sei es ein lebensspendender Quell, ein Wasser zu neuer Geburt , eine sühnende Flut. Und alle, die gewaschen werden in
      diesem heiligen Bad, volle Reinigung werde ihnen zuteil und Nachlaß der Sünden durch das Wirken des Heiligen Geistes
      in ihnen.
  - latin: 'Unde benedico te, creatura aquae, per Deum † vivum, per Deum † verum, per Deum † sanctum: per Deum, qui te, in
      principio, verbo separavit ab arida: cuius Spiritus super te ferebatur.'
    german: Und so segne ich dich, du Geschöpf des Wassers, durch den lebendigen Gott, den wahren Gott, den heiligen Gott,
      durch Gott, der mit Seinem Worte dich schied vom trockenen Land, dessen Geist im Anfang über dir schwebte.
  - latin: 'Qui te paradisi fonte manare fecit, et in quatuor fluminibus totam terram rigare praecepit. Qui te in deserto
      amaram, suavitate indita, fecit esse potabilem, et sitienti populo de petra produxit. Bene†dico te et per Iesum Christum
      Filium eius unicum, Dominum nostrum: qui te in Cana Galilaeae signo admirabili, sua potentia convertit in vinum. Qui
      pedibus super te ambulavit: et a Ioanne in Iordane in te baptizatus est. Qui te una cum sanguine de latere suo produxit:
      et discipulis suis iussit, ut credentes baptizarentur in te, dicens: Ite, docete omnes gentes, baptizantes eos in nomine
      Patris, et Filii, et Spiritus Sancti.'
    german: 'Er ließ dich entspringen der Quelle im Paradies und gebot dir, in vier Strömen die ganze Erde zu netzen; Er verlieh
      dir Süßigkeit in der Wüste, als du bitter gewesen, und machte dich trinkbar; Er rief dich aus dem Felsen hervor, das
      dürstende Volk zu erquicken. Ich segne dich auch durch Seinen alleini­gen Sohn, unsern Herrn Jesus Christus, der dich
      zu Kana in Galiläa hat verwandelt in Wein durch ein Wunderzeichen Seiner göttlichen Macht; der mit Seinen Füßen auf
      dir einherging; der im Jordan von Johannes getauft ward mit dir; der dich aus Seiner Seite hervorquellen ließ zusam­men
      mit Blut. Er befahl Seinen Jüngern, sie sollten mit dir die Gläubigen taufen, und sprach: Geht hin und lehret alle Völker
      und taufet sie im Namen des Vaters und des Sohnes und des Heiligen Geistes.'
  - latin: 'U

      Haec nobis praecepta servantibus tu, Deus omnipotens, clemens adesto: tu benignus aspira.'
    german: Indes wir diesen Auftrag voll­führen, stehe Du in Deiner Güte uns bei, allmächtiger Gott; sende Du uns gnädig
      den Hauch Dei­nes Geistes.
  - latin: 'U

      Tu has simplices aquas tuo ore benedicito: ut praeter naturalem emundationem, quam lavandis possunt adhibere corporibus,
      sint etiam purificandis mentibus efficaces.'
    german: Weihe Du mit Deinem Munde dieses lautere Wasser. Es wasche nicht nur den Körper auf die natürliche "Weise, wirksam
      sei es vielmehr, rein zu machen die Seele.
  - latin: Descendat in hanc plenitudinem fontis virtus Spiritus Sancti.
    german: Es steige herab in diesen vollen Born die Kraft des Heiligen Geistes.
  - latin: Totamque hujus aquae substantiam, regenerandi fecundet effectu.
    german: Und er befruchte all dieses Wasser, auf daß es wirke die neue Geburt.
  - latin: 'Hic omnium peccatorum maculae deleantur: hic natura ad imaginem tuam condita, et ad honorem sui reformata principii,
      conctis vetustatis squaloribus emundetur: ut omnis homo, sacramentum hoc regenerationis ingressus, in verae innocentiae
      novam infantium renascatur. Per Dominum nostrum Iesum Christum Filium tuum: qui venturus est iudicare vivos et mortuos,
      et saeculum per ignem. R. Amen.'
    german: So werde hier getilgt alle Makel der Sünde; rein gewaschen werde hier die Natur von jedem Unflat des alten Menschen,
      jene Natur, die geschafften nach Deinem Bilde, die nun zur Würde ihres Ursprungs zurückkehrt. Und jeder, der eingeht
      in dieses Sakrament der neuen Geburt, zu neuer Kindheit werde er wiedergeboren in wahrer Unschuld. Durch DeinenSohn,
      unsern Herrn Jusus Christus, der da kommen wird, zu richten die Lebenden und die Toten und die Welt durch das Feuer.
      Amen.
  - latin: Sanctificetur et fecundetur fons iste Oleo salutis renascentibus ex eo, in vitam aeternam. A Amen.
    german: Das Öl des Heiles befruchte und heilige diesen Brunnen für alle, die aus ihm wiedergeboren wer­den zum ewigen
      Leben. Amen.
  - latin: Infusio Chrismatis Domini nostri Iesu Christi, et Spiritus Sancti Paracliti, fiat in nomine santae Trinitatis.
      R. Amen.
    german: Im Namen der Heiligen Drei­faltigkeit werde eingegossen der Chrisam unseres Herrn Jesus Christus und des Heiligen
      Gei­stes, des Helfers. Amen.
  - latin: Commixtio Chrismatis sanctificationis, et Olei unctionis, et aquae baptismatis, pariter fiat in nomine Pa†tris,
      et Fi†lii, et Spiritus † Sancti. R. Amen.
    german: Der Chrisam der Heiligung und das Öl der Salbung und das Wasser der Taufe, sie seien zusammengetan im Namen des
      Va­ters und des Sohnes und des Hei­ligen Geistes. Amen.
node13:
  title: Taufe und Prozession zum Taufbrunnen
  pairs:
  - latin: 'Sicut cervus desiderat ad fontes aquarum: ita desiderat anima mea ad te, Deus. Sitivit anima mea ad Deum vivum,
      quando veniam, et apparebo ante faciem Dei? Fuerunt mihi lacrymae meae panes die ac nocte, dum dicitur mihi per singulos
      dies: Ubi est Deus tuus?'
    german: 'Ch Wie der Hirsch verlangt nach den Quellen der Wasser, / so verlangt, o Gott, meine Seele nach Dir. Ch. Meine
      Seele dür­stet nadi dem lebendigen Gott. / Wann darf ich kommen und treten vor Gottes Angesicht? 1u. 2. Ch. Meine Tränen
      sind mir zum Brot geworden bei Tag und bei Nacht; / an jedem Tage fragen sie mich: Wo bleibt dein Gott?'
  - latin: 'Pr. Dominus vobiscum.

      A. Et cum spiritu tuo.'
    german: 'Der Herr sei mit euch.

      Und mit deinem Geiste.'
  - latin: 'Oremus. Omnipotens sempiterne Deus, respice propitius ad devotionem populi renascentis, qui sicut cervus, aquarum
      tuarum expetit fontem: et concede propitius; ut fidei ipsius sitis, baptismatis mysterio, animam corpusque sanctificet.
      Per Dominum nostrum Iesum Christum, qui tecum vivit et regnat in unitate Spiritus Sancti, Deus, per omnia saecula saeculorum.
      R. Amen.'
    german: Lasset uns beten. Allmächtiger, ewiger Gott, blicke gnädig herab auf das fromme Verlangen dieser Schar, die nun
      wiedergeboren soll werden und die gleich dem Hirsch verlangt nach dem Quell Deiner Wasser; gewähre in Gnaden, daß ihr
      Durst nach dem Glauben sie heilig mache an Leib und Seele im Heiltum der Taufe. Durch unsern Herrn. Amen.
node14:
  title: Allerheiligenlitanei II und Taufversprechen
  pairs:
  - latin: Propitius esto, parce nobis, Domine.
    german: Sei uns gnädig, verschone uns, o Herr.
  - latin: Propitius esto, exaudi nos, Domine.
    german: Sei uns gnädig, erhöre uns, o Herr.
  - latin: Ab omni malo, libera nos, Domine.
    german: Von allem Übel, erlöse uns, o Herr.
  - latin: Ab omni peccato, libera nos, Domine.
    german: Von aller Sünde,
  - latin: A morte perpetua, libera nos, Domine.
    german: Von dem ewigen Tode,
  - latin: Per mysterium sanctae Incarnationis tuae, libera nos, Domine.
    german: Durch das Geheimnis Deiner heiligen Menschwerdung,
  - latin: Per adventum tuum, libera nos, Domine.
    german: Durch Deine Ankunft,
  - latin: Per nativitatem tuum, libera nos, Domine.
    german: Durch Deine Geburt,
  - latin: Per baptismum et sanctum ieiunium tuum, libera nos, Domine.
    german: Durch Deine Taufe und Dein heiliges Fasten,
  - latin: Per crucem et passionem tuam, libera nos, Domine.
    german: Durch Dein Kreuz und Leiden,
  - latin: Per mortem et sepulturam tuam, libera nos, Domine.
    german: Durch Deinen Tod und Dein Begräbnis,
  - latin: Per sanctam resurrectionem tuam, libera nos, Domine.
    german: Durch Deine heilige Auferstehung,
  - latin: Per admirabilem ascensionem tuam, libera nos, Domine.
    german: Durch Deine wunderbare Himmelfahrt,
  - latin: Per adventum Spiritus Sancti Paracliti, libera nos, Domine.
    german: Durch die Ankunft des Heiligen Geistes, des Trösters,
  - latin: In die iudicii, libera nos, Domine.
    german: Am Tage des Gerichtes
  - latin: Peccatores, te rogamus, audi nos.
    german: Wir armen Sünder, wir bitten Dich, erhöre uns.
  - latin: Ut nobis parcas, te rogamus, audi nos.
    german: Daß Du uns verschonest,
  - latin: Ut Ecclesiam tuam sanctam regere et conservare digneris, te rogamus, audi nos.
    german: Daß Du Deine heilige Kirche regieren und erhalten wolllest,
  - latin: Ut domnum apostolicum et omnes ecclesiasticosn ordines in sancta religione conservare digneris, te rogamus, audi
      nos.
    german: Daß Du den apostolischen Oberhirten und alle Stände der Kirche in der heiligen Religion erhalten wollest,
  - latin: Ut inimicos sanctae Ecclesiae humiliare digneris, te rogamus, audi nos.
    german: Daß Du die Feinde der heiligen Kirche demütigen wollest,
  - latin: Ut regibus et principibus christianis, pacem et veram concordiam donare digneris, te rogamus, audi nos.
    german: Daß Du den christlichen Königen und Staatslenkern Frieden und wahre Eintracht schenken wol­lest,
  - latin: Ut nosmetipsos in tuo sancto servitio confortare et conservare digneris, te rogamus, audi nos.
    german: Daß Du uns selbst in Deinem heiligen Dienste stärken und erhalten wollest,
  - latin: Ut omnibus benefactoribus nostris sempiterna bona retribuas, te rogamus, audi nos.
    german: Daß Du alle unsere Wohltäter mit den ewigen Gütern belohnen wollest,
  - latin: Ut fructus terrae dare et conservare digneris, te rogamus, audi nos.
    german: Daß Du die Früchte der Erde geben und erhalten wollest,
  - latin: Ut omnibus fidelibus defunctis requiem aeternam donare digneris, te rogamus, audi nos.
    german: Daß Du allen verstorbenen Gläubigen die ewige Ruhe verleihen wollest,
  - latin: Ut nos exaudire digneris, te rogamus, audi nos.
    german: Daß Du uns erhören wollest
  - latin: Agnus Dei, qui tollis peccata mundi, exaudi nos, Domine.
    german: O Lamm Gottes, das Du hinwegnimmst die Sünden der Wel,t erhöre uns, o Herr.
  - latin: Agnus Dei, qui tollis peccata mundi, parce nobis, Domine.
    german: O Lamm Gottes, das Du hinwegnimmst die Sünden der Welt, verschone uns, o Herr.
  - latin: Agnus Dei, qui tollis peccata mundi, miserere nobis.
    german: O Lamm Gottes, das Du hinwegnimmst die Sünden der Welt, ererbarme Dich unser.
  - latin: Christe, audi nos.
    german: Christus, höre uns.
  - latin: Christe, exaudi nos.
    german: Christus, erhöre uns.
node15:
  title: Hochamt – Kyrie und Gloria
  pairs:
  - latin: 'Kyrie eleison

      Kyrie eleison

      Kyrie eleison'
    german: 'Herr, erbarme Dich unser

      Herr, erbarme Dich unser

      Herr, erbarme Dich unser'
  - latin: 'Christe eleison

      Christe eleison

      Christe eleison'
    german: 'Christus, erbarme Dich unser

      Christus, erbarme Dich unser

      Christus, erbarme Dich unser'
  - latin: 'Kyrie eleison

      Kyrie eleison

      Kyrie eleison'
    german: 'Herr, erbarme Dich unser

      Herr, erbarme Dich unser

      Herr, erbarme Dich unser'
  - latin: 'Gloria in excelsis Deo. Et in terra pax hominibus bonæ voluntatis. Laudamus

      te. Benedicimus te. Adoramus te. Glorificamus te. Gratias agimus tibi propter magnam gloriam tuam. Domine Deus, Rex
      cælestis, Deus Pater omnipotens. Domine Fili unigenite, Jesu Christe. Domine Deus, Agnus Dei, Filius Patris. Qui tollis
      peccata mundi, miserere nobis. Qui tollis peccata mundi, suscipe deprecationem nostram. Qui sedes ad dexteram Patris,
      miserere nobis. Quoniam tu solus Sanctus. Tu solus Dominus. Tu solus Altissimus, Jesu Christe. Cum Sancto Spiritu †
      in gloria Dei Patris. Amen.'
    german: 'Ehre sei Gott in der Höhe. Und auf Erden Friede den Menschen, die guten Willens sind. Wir loben Dich. Wir preisen
      Dich. Wir beten Dich an. Wir verherrlichen Dich. Wir sagen Dir Dank ob Deiner großen Herrlichkeit. Herr und Gott, König
      des Himmels, Gott allmächtiger Vater! Herr Jesus Christus, eingeborener Sohn! Herr und Gott, Lamm Gottes, Sohn des Vaters!
      Du nimmst hinweg die Sünden der Welt: erbarme Dich unser. Du nimmst hinweg die Sünden der Welt: nimm unser Flehen gnädig
      auf. Du sitzest zur Rechten des Vaters: erbarme Dich unser. Denn Du allein bist der Heilige. Du allein der Herr. Du
      allein der Höchste, Jesus Christus, Mit dem Hl. Geiste, † in der Herrlichkeit Gottes des Vaters. Amen.'
node16:
  title: Oratio – Collecta
  pairs:
  - latin: 'Oremus Deus, qui hanc sacratissimum noctem gloria dominicae Resurrectionis illustras: conserva in nova familiae
      tuae progenie adoptionis spiritum, quem dedisti; ut, corpore et mente renovati, puram tibi exhibeant servitutem. Per
      eumdem Dominum nostrum Iesum Christum, Filium tuum: qui tecum vivit et regnat in unitate Spiritus Sancti Deus, per omnia
      saecula saeculorum. R. Amen.'
    german: O Gott, Du erhellest diese hoch­heilige Nacht durch die glorreiche Auferstehung unseres Herrn; er­halte in den
      neugeborenen Glie­dern Deiner Kirche den Geist Deiner Kindschaft, den Du ihnen verliehen, auf daß sie, neu ge­worden
      an Seele und Leib, einen makellosen Dienst Dir entbieten. Durch Ihn, unsern Herrn. R Amen.
node17:
  title: Epistel – Kol 3,1-4
  pairs:
  - latin: 'Fratres: si consurrexistis cum Christo, quae sursum sunt quaerite, ubi Christus est in dextera Dei sedens: quae
      sursum sunt sapite, non quae super terram. Mortui enim estis, et vita vestra est abscondita cum Christo in Deo. Cum
      Christus apparuerit, vita vestra: tunc et vos apparebitis cum ipso in gloria.'
    german: Brüder! Seid ihr auferstanden mit Christus, so suchet, was oben ist, wo Christus thronet zur Rechten Gottes. Was
      oben ist, habet im Sinn, nicht was auf Erden. Denn gestorben seid ihr, und vereint mit Christus, ist euer Leben verborgen
      in Gott. Wenn aber Chistus, unser Leben, dereinst in Herrlichkeit wird erscheinen, dann sollet auch ihr, vereint mit
      Ihm, offenbar werden in Herrlichkeit.
node18:
  title: Alleluia – Ps 117
  pairs:
  - latin: 'Pr. Alleluja.

      Pr. Alleluja.

      Pr. Alleluja.'
    german: 'A Alleluja.

      A Alleluja.

      A Alleluja.'
  - latin: 'V Confitemini Domino, quoniam bonus:

      quoniam in saeculum misericordia eius.'
    german: 'V Preiset den Herrn, denn Er ist gut! /

      In Ewigkeit währt Sein Erbarmen.'
  - latin: 'Laudate Dominum omnes gentes:

      et collaudate eum, omnes populi.

      Quoniam confirmata est super nos misericordia eius:

      et veritas Domini manet in aeternum.'
    german: 'Ch. Lobet den Herrn, alle Völ­ker; /

      ihr Stämme alle, lobpreiset Ihn!

      2. Ch. Denn mächtig waltet über uns Seine Gnade, /

      und Seine Treue währt in Ewigkeit.'
node19:
  title: Evangelium – Mt 28,1-7
  pairs:
  - latin: 'Sequentia sancti Evangelii secundum Matthæum. Vespere autem sabbati, quae lucescit in prima sabbati, venit Maria
      Magdalene, et altera Maria videre sepulchrum. Et ecce terraemotus factus est magnus. Angelus enim Domini descendit de
      coelo: et accedens revolvit lapidem, et sedebat super eum: erat autem aspectus eius sicut fulgur: et vestimentum eius
      sicut nix. Prae timore autem eius exterriti sunt custodes, et factu sunt velut mortui. Respondens autem Angelus, dixit
      mulieribus: Nolite timere vos: scio enim, quod Iesum, qui crucifixus est, quaeritis: non est hic: surrexit enim, sicut
      dixit. Venite, et videte locum, ubi positus erat Dominus. Et cito euntes dicite discipulis eius, quia surrexit et ecce
      praecedit vos in Galilaeam: ibi eum videbitis. Ecce praedixi vobis.'
    german: 'Als vorüber der Sabbat, als das Licht des ersten Tages nach dem Sabbat heraufkam, da gingen Maria Magdalena und
      die andere Maria, um nach dem Grabe zu sehen. Und siehe, es geschah ein großes Beben der Erde. Vom Himmel herab stieg
      ein Engel des Herrn, und er trat hinzu und wälzte den Stein hinweg und setzte sich nieder auf ihn. Er war anzusehn wie
      der Blitz, und sein Gewand war weiß wie der Schnee. In Furcht vor ihm erbebten die Wächter, und sie waren wie tot. Der
      Engel aber sprach zu den Frauen: „Ihr, fürchtet euch nicht! Ich weiß, ihr suchet Jesus, den Gekreuzigten. Er ist nicht
      hier denn auferstanden ist Er, wie er gesagt. Kommet und sehet die Stätte, wo Er gelegen. Eilends geht hin und sagt
      Seinen Jüngern: Er ist von von den Toten erstanden! Und wisset: Er wird euch vorangehen nach Galiläa, dort sollt ihr
      Ihn schauen. Seht, ich habe es euch gesagt."'
node20:
  title: Secreta
  pairs:
  - latin: 'Suscipe, quaesumus, Domine, preces populi tui, cum oblationibus hostiarum: ut paschalibus initiata mysteriis,
      ad aeternitatis nobis medelam, te operante, proficiant. Per Dominum nostrum Iesum Christum, Filium tuum, qui tecum vivit
      et regnat in unitate Spiritus Sancti, Deus, per omnia saecula saeculorum. R Amen.'
    german: Wir bitten, Dich, Herr, nimm ari die Gebete Deines Volkes, nimttl an unsere Opfergaben; weihe sie durch diese
      österlichen Mysterien zu einem neuen Beginn, daß sie in der Kraft Deiner Gnade uns Mittel des Heiles werden zUrn ewigen
      Leben. Durch uns. Herrn Jesus Christus, Deinen Soh, der mit Dir lebt und herrscht in der Einheit mit dem Heiligen Geiste,
      Gott von Ewigkeit zu Ewigkeit. R Amen.
node21:
  title: Praefatio Paschalis
  pairs:
  - latin: 'Vere dignum et justum est, æquum et salutare: Te quidem, Domine, omni tempore, sed in hac potissimum nocte gloriosius
      prædicare, cum Pascha nostrum immolatus est Christus. Ipse enim verus est Agnus, qui abstulit peccata mundi. Qui mortem
      nostram moriendo destruxit, et vitam resurgendo reparavit. Et ideo cum Angelis et Archangelis, cum Thronis et Dominationibus
      cumque omni militia cælestis exercitus, hymnum gloriæ tuæ canimus, sine fine dicentes:'
    german: 'Es ist in Wahrheit würdig und recht, billig und heilsam, Dich, Herr, zu jeder Zeit, vornehmlich aber in dieser
      Nacht mit besonders festlichem Jubel zu preisen, weil Christus als unser Osterlamm geopfert ist. Er ist in Wahrheit
      das Lamm, das hinwegnimmt die Sünden der Welt. Durch sein Sterben hat Er unsern Tod vernichtet und durch Seine Auferstehung
      neues Leben uns erworben. Darum singen wir mit den Engeln und Erzengeln, mit den Thronen und Herrschaften und mit der
      ganzen himmlischen Heerschar den Hochgesang Deiner Herrlichkeit und rufen ohne Unterlaß:'
  - latin: Sanctus, Sanctus, Sanctus, Dominus Deus Sabaoth. Pleni sunt cæli et terra gloria tua. Hosanna in excelsis. Benedictus,
      qui venit in nomine Domini. Hosanna in excelsis.
    german: Heilig, Heilig, Heilig, Herr, Gott der Heerscharen. Himmel und Erde sind erfüllt von Deiner Herrlichkeit. Hosanna
      in der Höhe! Hochgelobt sei, der da kommt im Namen des Herrn! Hosanna in der Höhe!
node22:
  title: Communicantes
  pairs:
  - latin: 'Communicantes, et noctem sacratissimam celebrantes Resurrectionis Domini nostri Jesu Christi secundum carnem:
      sed et memoriam venerantes, in primis gloriosæ semper Vírginis Maríæ, Genitrícis ejusdem Dei et Dómini nostri Jesu Christi:
      sed et beati Joseph, eiusdem Virginis Sponsi, et beatorum Apostolorum ac Martyrum tuorum, Petri et Pauli, Andreæ, Jacobi,
      Joannis, Thomæ, Jacobi, Philippi, Bartholomaei, Matthaei, Simonis et Thaddaei: Lini, Cleti, Clementis, Xysti, Cornelii,
      Cypriani, Laurentii, Chrysogoni, Joannis et Pauli, Cosmæ et Damiani: et omnium Sanctorum tuorum, quorum meritis precibusque
      concedas, ut in omnibus protectionis tuæ muniamur auxilio. Per eundem Christum Dominum nostrum. Amen'
    german: In heiliger Gemeinschaft feiern wir die hochheilige Nacht der leiblichen Auferstehung unsres Herrn Jesus Christus.
      Dabei ehren wir vor allem das Andenken der glorreichen, allzeit reinen Jungfrau Maria, der Mutter Jesu Christi, unsres
      Herrn und Gottes, sowie des hl. Joseph, ihres Bräutigams, wie auch Deiner hll. Apostel und Blutzeugen Petrus und Paulus,
      Andreas, Jakobus, Johannes, Thomas, Jakobus, Philippus, Bartholomäus, Matthäus, Simon und Thaddäus, Linus, Kletus, Klemens,
      Xystus, Kornelius, Cyprianus, Laurentius, Chrysogonus, Johannes und Paulus, Kosmas und Damianus, und aller Deiner Heiligen.
      Ob ihrer Verdienste und Fürbitten gewähre uns in allem hilfreich Deinen Schutz und Beistand. Durch Christus unseren
      Herrn. Amen.
node23:
  title: Hanc igitur
  pairs:
  - latin: 'Hanc igitur oblationem servitutis nostræ, sed et cunctæ familiæ tuæ, quam tibi offerimus pro his quoque, quos
      regenerare dignatus es ex aqua et Spiritu Sancto, tribuens eis remissionem omnium peccatorum, quæsumus, Domine, ut placatus
      accipias: diesque nostros in tua pace disponas, atque ab æterna damnatione nos eripi, et in electorum tuorum jubeas
      grege numerari: Per Christum, Dominum nostrum. Amen.'
    german: So nimm denn, Herr, wir bitten Dich, diese Opfergabe Deiner Diener, aber auch Deiner ganzen Familie huldvoll auf.
      Wir bringen sie Dir auch für jene dar, die Du erbarmungsvoll aus dem Wasser und dem Hl. Geiste wiedergeboren, denen
      Du Nachlassung all ihrer Sünden erteilt hast. Leite unsre Tage in Deinem Frieden, bewahre uns gütig vor der ewigen Verdammnis
      und reihe uns ein in die Schar Deiner Auserwählten. Durch Christus, unsern Herrn. Amen.
node24:
  title: Communio – Ps 117
  pairs:
  - latin: 'Danket dem Herrn, denn Er ist gut: / in Ewigkeit währt Sein Erbarmen.

      Saget, ihr Söhne Israels: / In Ewigkeit währt Sein Erbarmen.

      Saget, ihr Söhne Aarons: / In Ewigkeit währt Sein Erbarmen.

      Saget alle, die ihr fürchtet den Herrn: / In Ewigkeit währt Sein Erbarmen.

      Ich rief zum Herrn in meiner Bedrängnis, / und Er hat mich erhört und errettet.

      Der Herr ist mit mir, ich fürchte mich nicht: / was könnte ein Mensch mir antun!

      Der Herr ist mit mir, Er kommt mir zu Hilfe: / und in Schande werde ich sehn meine Feinde.Besser, seine Zuflucht nehmen
      zum Herrn, / als zu bauen auf Menschen!

      Besser, seine Zuflucht nehmen zum Herrn, / als zu bauen auf Fürsten!

      Die Heiden alle umringten mich: / ich habe sie zertreten im Namen des Herrn.

      Von allen Seiten umringten sie mich: / ich habe sie zertreten im Namen des Herrn.

      Sie drangen auf mich ein wie Schwärme von Bienen, / wie Feuer unter Dornen sind sie entbrannt: / ich habe sie zertreten
      im Namen des Herrn.

      Gestoßen ward ich, hart gestoßen, ich sollte fallen, / der Herr aber hat mir geholfen.

      Meine Stärke und meine Kraft ist der Herr, / Er ist mir geworden zum Retter.

      Hört! Welch ein Siegesjubel in den Zelten der Frommen! / Stark erwiesen hat sich die Rechte des Herrn.

      Die Rechte des Herrn, sie hat mich erhöht! / Ja,stark erwiesen hat sich die Rechte des Herrn.'
    german: 'Ich werde nicht sterben, ich lebe, / und künden will ich die Taten des Herrn.

      Geschlagen hat mich der Herr, ja geschlagen, / doch Er gab mich dem Tode nicht preis.

      Tut mir auf der Gerechtigkeit Tore! / Eintreten will ich, Dank zu sagen dem Herrn.

      Dies ist die Pforte des Herrn, / durch sie gehn ein die Gerechten.

      Ich will Dir danken, denn Du hast mich erhört, / Du bist mir geworden zum Retter.

      Der Stein, den die Bauleute haben verworfen, / er ist zum Eckstein geworden.

      Durch den Herrn ist dieses geschehen: / ein Wunder vor unseren Augen.

      Dies ist der Tag, den uns bereitet der Herr: / laßt uns frohlocken und seiner uns freun!

      O Herr, sende Heil! / O Herr, gib Segen und Gnade!

      Gesegnet, der kommt im Namen des Herrn! / Vom Hause Gottes segnen wir euch; / der Herr ist Gott, uns leuchtet Sein Licht.

      Reihet euch ein in den Zug mit festlichen Zweigen, / bis zu den Hörnern des Altares ziehet hinan!

      Mein Gott bist Du, ich sage Dir Dank! / Mein Gott, mit Lobgesang will ich Dich preisen.

      Danket dem Herrn, denn Er ist gut: / in Ewigkeit währt Sein Erbarmen.

      Ehre sei dem Vater und dem Sohne und dem Heiligen Geiste: / wie es war im Anfang, so auch jetzt und allezeit und in
      Ewigkeit. Amen.'
node25:
  title: Laudes
  pairs:
  - latin: Alleluia, alleluia, alleluia.
    german: Alleluia, alleluia, alleluia.
  - latin: 'Laudate Dominum in sanctis eius * laudate eum in firmamento virtutis eius.

      Laudate eum in virtutibus eius, * laudate eum secundum multitudinem magnitudinis eius.

      Laudate eum in sono tubae, * laudate eum in psalterio, et cithara.

      Laudate eum in tympano, et choro: * laudate eum in chordis et organo.

      Laudate eum in cymbalis benesonantibus: † laudate eum in cymbalis iubilationis: * omnes spiritus laudet Dominum.

      Gloria Patri, et Filio, * et Spiritui Sancto.

      Sicut erat in principio, et nunc, et semper, * et in saecula saeculorum. Amen.'
    german: 'Lobpreist den Herrn in Seinem Heiligtum * lobt Ihn in Seiner starken Feste.

      Lobt Ihn ob Seiner Wunder taten, * lobt Ihn ob Seiner großen Macht.

      Lobt Ihn im Schalle der Posaunen, * lobt Ihn mit Harfe und mit Zither.

      Lobt Ihn mit Pauken und mit Reigentanz, * lobt Ihn mit Saitenspiel und Flöten.

      Lobt Ihn im Klang der Zimbeln, lobt Ihn mit Freudenzimbeln. * Alles, was Odem hat, lobe den Herrn!

      Ehre sei dem Vater und dem Sohne * und dem Heiligen Geiste;

      Wie es war im Anfang, so auch jetzt und allezeit * und in Ewigkeit. Amen.'
  - latin: 'Alleluia, alleluia, alleluia.

      Et valde mane una sabbatorum, veniunt ad monumentum, orto iam sole, alleluia.'
    german: 'Alleluia, alleluia, alleluia.

      Und gar frühe, / am ersten Tag nach dem Sabbat, / da kommen sie zum Grab, als eben aufging die Sonne, alleluja'
  - latin: 'Benedictus Dominus, Deus Israel, * quia visitavit et redemit populum suum.

      Et erexit cornu salutis nobis * in domo David pueri sui.

      Sicut locutus est per os sanctorum, * qui a saeculo sunt, prophatarum eius:

      Salutem ex inimicis nostris, * et de manu omnium qui oderunt nos,

      Ad faciendam misericordiam cum patribus nostris: * et memorari testamenti sui sancti.

      Iusiurandum, quod iuravit ad Abraham patrem nostrum, * daturum se nobis,

      Ut sine timore, de manu inimicorum nostrorum liberati, * serviamus illi,

      In sanctitate et iustitia coram ipso, * omnibus diebus nostris.

      Et tu, puer, propheta Altissimi vocaberis: * praeibis enim ante faciem Domini parare vias eius,

      Ad dandam scientiam salutis plebi eius, * in remissionem peccatorum eorum,

      Per viscera misericordiae Dei nostri: * in quibus visitavit nos, oriens ex alto,

      Illuminare his qui in tenebris et in umbra mortis sedent: * ad dirigendos pedes nostros in viam pacis.

      Gloria Patri, et Filio, * et Spiritui Sancto.

      Sicut erat in principio, et nunc, et semper, * et in saecula saeculorum. Amen.'
    german: 'Gepriesen sei der Herr, der Gott Israels! * Denn heimgesucht hat Er Sein Volk und ihm Erlösung bereitet.

      Er ließ uns erstehn ein Zeichen des Heiles * in dem Haus Seines Knechtes David.

      So hat Er gesprochen durch den Mund Seiner Heiligen, * durch die Propheten der Vorzeit: Er werde uns befreien aus der
      Feinde Gewalt, * aus den Händen aller, die mit Haß uns verfolgen;

      Er werde Sich unserer Väter er­barmen * und gedenken Seines heiligen Bundes; Ja, gedenken will Er des Eides, * den Er
      geschworen Abraham, unserem Vater:

      Daß wir dürfen furchtlos Ihm dienen, * befreit aus den Hän­den der Feinde:

      In Heiligkeit und Treue vor Ihm * an allen Tagen des Lebens. Und du, mein Kind, wirst ge­nannt: des Höchsten Prophet!
      * Vorangehn wirst du dem Herrn, Ihm bereiten die Wege. Seinem Volke wirst du künden das Heil: * die Vergebung der Sünden.

      Durch unseres Gottes erbarmen­de Liebe * sucht Er uns heim: der hervorgeht von oben: Um zu erleuchten, die in Finster­nis
      sitzen und im Schatten des Todes, * um unsere Füße zu len­ken auf die Pfade des Friedens.

      Ehre sei dem Vater und dem Sohne * und dem Heiligen Geiste;

      Wie es war im Anfang, so auch jetzt und allezeit * und in Ewigkeit. Amen.'
  - latin: Et valde mane una sabbatorum, veniunt ad monumentum, orto iam sole, alleluja.
    german: Und gar frühe, / am ersten Tag nach dem Sabbat, / da kommen sie zum Grab, als eben aufging die Sonne, alleluja.
node26:
  title: Postcommunio
  pairs:
  - latin: 'Pr. Dominus vobiscum.

      A. Et cum spiritu tuo.'
    german: 'Pr. Der Herr sei mit euch.

      A. Und mit deinem Geiste.'
  - latin: 'Pr. Oremus. Spiritum nobis, Domine, tuae caritatis infunde: ut, quos sacramentis Paschalibus satiasti tua facias
      pietate concordes. Per Dominum nostrum Jesum Christum, Filium tuum: Qui tecum vivit et regnat in unitate Spiritus Sancti
      Deus: per omnia sæcula sæculorum. R Amen.'
    german: Pr. Lasset uns beten. Gieße uns ein, o Herr, den Geist Deiner Liebe und wie Du uns mit den österlichen Sakramenten
      gesättigt, so schließe uns huldvoll zusammen in dauernder Eintracht. Durch unsern Herrn Jesus Christus, Deinen Sohn,
      der mit Dir lebt und herrscht in der Einheit des Heiligen Geistes, Gott von Ewigkeit zu Ewigkeit. R Amen.
  - latin: 'Pr. Dominus vobiscum.

      A. Et cum spiritu tuo.'
    german: 'Pr. Der Herr sei mit euch.

      A. Und mit deinem Geiste.'
  - latin: 'D. Ite, missa est, alleluja, alleluja.

      A. Deo gratias, alleluja, alleluja.'
    german: 'D. Gehet hin, ihr seid entlassen, alleluja, alleluja.

      A. Dank sei Gott, alleluja, alleluja.'
