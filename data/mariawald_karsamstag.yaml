node3:
  title: Feuerweihe
  pairs:
  - latin: 'Pr. Dominus vobiscum.

      A. Et cum spiritu tuo.'
    german: 'Pr.Der Herr sei mit euch.

      A.Und mit deinem Geiste.'
  - latin: 'Oremus. Deus, qui per Filium tuum, angularem scilicet lapidem, claritatis tuae ignem fidelibus contulisti: prductum
      e silice, nostris profuturum usibus, novum hanc ignem sancti†fica: et concede nobis, ita per haec festa paschalia caelestibus
      desideriis inflammari; ut ad perpetuae claritatis, puris mentibus, valeamus festa pertingere. Per eumdem Christum Dominum
      nostrum. R. Amen.'
    german: Lasset uns beten. O Gott, durch Deinen Sohn, den wahren Eckstein­, hast Du den Gläubigen das Feuer Deiner strahlenden
      Herr­lichkeit mitgeteilt; diesem neuen Feuer, das wir zu unserem Dienst aus dem Stein geschlagen, gib Deine Weihe und
      laß uns durch diese Osterfeier so zu den himmlischen Begierden entflammt werden, daß wir mit reiner Seele zur ewigen
      Festfeier gelangen. Durch Ihn, Christus, unseren Herrn. R Amen
node4:
  title: Weihe der Osterkerze
  pairs:
  - latin: 'Pr. Dominus vobiscum.

      A. Et cum spiritu tuo.'
    german: 'Pr. Der Herr sei mit euch.

      A. Und mit deinem Geiste.'
  - latin: 'Oremus. Veniat, quaesumus, omnipotens Deus, super hunc incensum cereum larga tuae bene † dictionis infusio: et
      hunc nocturnum splendorem invisibilis regenerator intende; ut non solum sacrificium, quod hac nocte litatum est, arcana
      luminis tui admixtione refulgeat; sed in quocumque loco ex huius sanctificationis mysterio aliquid fuerit deportatum,
      expulsa dibolicae fraudis nequitia, virtus tuae maiestatis assistat. Per Christum Dominum nostrum.

      A Amen.'
    german: 'Laßet uns beten. Wir bitten Dich, allmächtiger Gott, über diese brennende Kerze komme herab der reiche Strom
      Deines Segens: Du Unsichtbarer, der Du wirkest die neue Geburt, schaue gnädig auf den Lichtglanz dieser nächtlichen
      Stunde. Im Scheine Deines geheimnisvollen Lichtes erstrahle das Opfer, das dargebracht wurde in dieser Nacht. Und überall,
      wohin etwas gebracht wird von diesem geheimnismächtigen Heiltum, dort weiche die Bosheit des teuflischen Truges, die
      Macht Deiner Majestät sei dort hilfreich zugegen. Durch Christus, unsern Herrn.

      Amen'
node5:
  title: Einzug mit der Osterkerze
  pairs: []
node6:
  title: Exsultet
  pairs:
  - latin: 'Dóminus sit in corde tuo et labiis tuis: ut digne et competenter annunties suum paschale praeconium: In nomine
      Patris, et Filii, et Spiritus Sancti. Amen'
    german: 'Der Herr sei in deinem Herzen und auf deinen Lippen, auf daß du als Herold geziemend verkündest Seinen österlichen
      Lobpreis: Im Namen des Vaters und des Sohnes und des Heiligen Geistes. Amen'
  - latin: 'Exsultet iam Angelica turba caelorum: exsultent divina mysteria: et pro tanti Regis victoria, tuba insonet salutaris.

      Gaudeat et tellus tantis irradiata fulgoribus: et aeterni Regis splendore illustrata, totius orbis se sentiat amisisse
      caliginem.

      Laetetur et mater Ecclesia, tanti luminis adornata fulgoribus: et magnis populorum vocibus haec aula resultet.

      Quapropter astantes vos, fratres carissimi, ad tam miram huius sancti luminis claritatem, una mecum, quaeso, Dei omnipotentis
      misericordiam invocate. Ut qui me non meis meritis intra Levitarum numerum dignatus est aggregare: luminis sui claritatem
      infundens, Cerei huius laudem implere perficiat.

      Per Dominum nostrum Iesum Christum Filium suum: qui cum eo vivit et regnat in unitate Spiritus Sancti Deus:'
    german: 'Frolocket nun, all ihr himmlischen Chöre der Engel! Frohlocket, ihr seligen Scharen! Töne hell, Posaune des Heiles;
      preise den Sieger, den erhabenen König!

      Erfreue dich , o Erde, überflutet vom Strahl aus der Höhe; Licht des ewigen Königs umleuchtet dich! Wisse: entschwunden
      ist allerorten das Dunkel!

      Auch du freue Dich, Mutter Kirche, strahlend im Glanze so herrlichen Lichtes! Halle wider, du hehrer Tempel; halle von
      des Volkes mächtigem Jubel!

      Darum bitte ich euch, geliebte Brüder, ihr Zeugen der wunderbaren Klarheit dieses heiligen Lichtes: rufet doch an mit
      mir die Barmherzigkeit des allmächtigen Gottes! Und Er, der mich berufen in die Schar der Leviten, ohne eigen Verdienst,
      nur erwählet aus Gnade, lichtvoll mache Er mich in dem Schein Seines Lichtes, würdig, das Lob dieser Leuchte zu künden.

      Durch Seinen Sohn, unsern Herrn Jesus Christus, der mit Ihm lebt und als König herrschet in Einheit mit dem Heiligen
      Geiste: Ein Gott'
  - latin: 'Per omnia saecula saeculorum. A. Amen

      V Dominus vobiscum.

      A Et cum spiritu tuo.

      V Sursum corda.

      A Habemus ad Dominum.

      V Gratias agamus Domino Deo nostro.

      A Dignum et iustum est.'
    german: 'Von Ewigkeit zu Ewigkeit. Amen

      V Der Herr sei mit euch.

      V Und mit deinem Geiste.

      V Erhebet die Herzen.

      V Wir haben sie beim Herrn.

      V Dank laßt uns sagen dem Herrn, unserm Gott.

      V Würdig ist es und recht.'
  - latin: 'Vere dignum et iustum est, invisibilem Deum Patrem omnipotentem, Filiumque eius unigenium, Dominum nostrum Iesum
      Christum, toto cordis ac mentis affectu, et vocis ministerio personare. Qui pro nobis aeterno Patri, Adae debitum solvit:
      et veteris piaculi cautionem pio cruore detersit.

      Haec sunt enim festa paschalia, in quibus verus ille Agnus occiditur, cuius sanguine postes fidelium consecrantur.

      Haec nox est, in qua primum patres nostros filios Israel eductos de Aegypto, mare Rubrum sicco vestigio transire fecisti.

      Haec igitur nox est, quae peccatorum tenebras, columnae illuminatione purgavit.

      Haec nox est, quae hodie per universum mundum, in Christo credentes, a vitiis saeculi, et caligine peccatorum segregatos,
      reddit gratiae, sociat sanctitati.

      Haec nox est, in qua destructus vinculis mortis, Christus ab inferis victor ascendit. Nihil enim nobis nasci profuit,
      nisi redimi profuisset.

      O mira circa nos tuae pietatis dignatio!

      O inaestimabilis dilectio caritatis: ut servum redimeres, Filium tradidisti!

      O certe necessarium Adae peccatum, quod Christi morte deletum est!

      O felix culpa, quae talem ac tantum meruit habere Redemptorem!

      O vere beata nox, quae sola meruit scire tempus et horam, in qua Christus ab inferis resurrexit! Haec nox est, de qua
      scriptum est: Et nox sicut dies illuminabitur: et nox illuminatio mea in deliciis meis.

      Huius igitur sanctificatio noctis fugat scelera, culpas lavat: et reddit innocentiam lapsis, et moestis laetitiam. Fugat
      odia, concordiam parat, et curvat imperia.

      In huius igitur noctis gratia, suscipe, sancte Pater, incensi huius sacrificium vespertinum: quod tibi in hac Cerei
      oblatione solemni, per ministrorum manus de operibus apum, sacrosancta reddit Ecclesia.

      Sed iam columnae huius praeconia novimus, quam in honorem Dei rutilans ignis accendit. Qui licet sit divisus in partes,
      mutuati tamen luminis detrimenta non novit. Alitur enim liquantibus ceris, quas in substantiam pretiosae huius lampadis,
      apis mater eduxit.

      O vere beata nox, quae exspoiliavit Aegyptos, ditavit Hebraeos! Nox, in qua terrenis caelestia, humanis divina iunguntur.

      Oramus ergo te, Domine: ut Cereus iste in honorem tui nominis consecratus, ad noctis huius caliginem destruendam, indeficiens
      perseveret. Et in odorem suavitatis acceptus, supernis luminaribus misceatur. Flammas eius lucifer matutinus inveniat.
      Ille, qui regressus ab inferis, humano generi serenus illuxit.

      Precamur ergo te, Domine: ut nos famulos tuos, omnemque clerum, et devotissimum populum: una cum beatissimo Papa nostro
      N. et Antistite nostro N. quiete temporum concessa, in his paschalibus gaudiis, assidua protectione regere, gubernare,
      et conservare digneris.

      Respice etiam ad eos, qui nos in potestate regunt, et, ineffabili pietatis et misericordiae tuae munere, dirige cogitationes
      eorum ad iustitiam et pacem, ut de terrena operositate ad caelestem patriam perveniant cum omni populo tuo.

      Per Christum Filium tuum: Qui tecum vivit et regnat in unitate Spiritus Sancti Deus:

      Per omnia saecula saeculorum. R. Amen.'
    german: 'In Wahrheit ist es würdig und recht, zu preisen mit aller Kraft des Herzens und Geistes und zu künden mit dem
      Jubel der Stimme Ihn, den verborgenen Gott, den allmächtigen Vater, und Seinen alleinigen Sohn, unsern Herrn Jesus Christus.
      Denn eingelöst hat Er an unserer Statt dem ewigen Vater die Schuld des Adam, ausgelöscht den Schuldbrief der alten Sünde
      mit Seinem Blut, das er vergossen aus Liebe.

      Heute ist die Feier der Ostern, da jenes wahre Lamm ist geschlachtet, dessen Blut die Türen der Gläubigen heiligt.

      Dies ist die Nacht, da Du einstens unsere Väter, die Söhne Israels, herausgeführt aus Ägypten und durch die Fluten des
      Roten Meeres trockenen Fußes geleitet.

      Dies also ist die Nacht, da jene Feuersäule besiegte das Dunkel der Sünde.

      Dies ist die Nacht, die scheidet heute alle auf Erden, die glauben an Christus, von den Lastern der Welt und den Finsternissen
      der Sünde, führt sie der Gnade zurück und gibt ihnen tel mit den Heiligen.

      Dies ist die Nacht, da Christus zerbrach die Bande des Todes und aus der Tiefe emporstieg als Sieger. Ja, nimmer käme
      uns Heil durch unsere Geburt, wäre uns das Heil nicht gekommen durch die Erlösung.

      O wundersames Erbarmen des Vaters: Du neigest Dich uns hernieder in Gnade!

      O unbegreifliche Huld Deiner Liebe: um loszukaufen den Knecht, hast Du hingegeben den Sohn!

      Ja, wahrlich geschehen mußte die Sünde des Adam, daß Christi Sterben sie sühne!

      O glückliche Schuld, gewürdigt eines Erlösers, so hehr und erhaben!

      O wahrhaft selige Nacht, einzig gewürdigt, zu wissen die Zeit und die Stunde, da Christus vom Tode erstanden. Dies ist
      die Nacht, von der steht geschrieben: Die Nacht wird hell wie der Tag; und: Eine Leuchte ist die Nacht meinen Wonnen.

      Geheiligt ist diese Nacht, zu bannen die Frevel, abzuwaschen die Schuld, den Sündern wiederzubringen die Unschuld, den
      Trauernden Freude; weit vertreibt sie den Haß, sie einet die Herzen und beugt die Gewalten.

      In dieser gnadengesegneten Nacht nimm an, o heiliger Vater, das Abendopfer dieser brennenden Kerze; Dir entrichtet diese
      festliche Gabe, bereitet vom Fleiße der Biene, durch die Hand ihrer Diener die heilige Kirche.

      Vernommen haben wir nun den Lobpreis dieser heiligen Säule, die entzündet ward am rötlichen Feuer zum Ruhme des Höchsten.
      Und ob auch die Flamme sich teilet, weiter spendet ihr Licht in die Runde, nicht wird gemindert die Kraft ihres Glanzes.
      Denn genährt wird sie vom schmelzenden Wachs, das zum Schaft dieser kostbaren Säule herbeigetragen die Biene.

      O wahrhaft selige Nacht, die Beute genommen von den Ägyptern und reich gemacht die Hebräer. O Nacht, die verbindet Himmel
      und Erde, Gott mit dem Menschen.

      So bitten wir Dich, o Herr: diese Kerze, geweiht zum Ruhm Deines Namens, ungemindert leuchte sie fort, in dieser Nacht
      zu scheuchen das Dunkel. Nimm sie an als lieblich duftentes Opfer, ihr Licht vermähle den Lichtern der Höhe! Ihre Flamme
      grüße den Morgenstern, jenen Bringer des Lichtes, der nimmer wird untergehn: jener ist es, der wiedergekehrt aus dem
      Reiche der Toten un den Menschen in Klarheit erschienen.

      Wir bitte4n Dich nun, o Herr: Gewähre uns Tage des Friedens, uns und allen, die Deinem Dienste geweiht, und dem Volk,
      das Dir in Treue ergeben, einig mit unserem Heiligen Vater N. Und mit unserem Bischof N.: in dieser freudigen Zeit der
      Ostern führe uns gnädig, leite und behüte uns immerdar.

      Blicke herab auch auf jene, die uns regieren kraft ihres Amtes; durch den Beistand Deiner unaussprechlichen Huld und
      Barmherzigkeit lenke ihren Sinn zu Frieden und Recht, auf daß sie mit Deinem ganzen Volke aus dem Getriebe der Welt
      gelangen zum himmlischen Vaterland.

      Dies gewähre uns durch Deinen Sohn, unsern Herrn Jesus Christus, der mit Dir lebt und als König herrscht in Einheit
      mit dem Heiligen Geiste:

      Ein Gott von Ewigkeit zu Ewigkeit. Amen.'
node7:
  title: Prophetie I – Gen 1,1-31; 2,1-2
  pairs:
  - latin: 'In principio creavit Deus caelum et terram. Terra autem erat inanis et vacua, et tenebrae erant super faciem abyssi:
      et Spiritus Dei ferebatur super aquas. Dixitque Deus: Fiat lux. Et facta est lux. Et vidit Deus lucem quod esset bona:
      et divisit lucem a tenebris. Appellavitque lucem Diem, et tenebras Noctem: factumque est vespere et name, dies unus.

      Dixit quoque Deus: Fiat firmamentum in medio aquarum: et dividat aquas ab aquis. Et fecit Deus firmamentum, divisitque
      aquas quae erant sub firmamento, ab his quae erant super firmentum. Et factum est ita. Vocavit Deus firmamentum Caelum:
      et factum est vespere et mane, dies secundus.

      Dixit vero Deus: Congregentur aquae, quae sub caelo sunt, in locum unum: et appareat arida. Et factum est ita. Et vocavit
      Deus aridam, Terram, congregationisque aquarum appellavit Maria. Et vidit Deus quod esset bonum. Et ait: Germinet terra
      herbam virentem, et facientem semen, et lignum pomiferum faciens fructum iuxta genus suum, cuius semen in semetipso
      sit super terram. Et factum est ita. Et protulit terra herbam virentem, et facientem semen iuxta genus suum, lignumque
      faciens fructum, et habens unumquodque sementem secundum speciem suam. Et vidit Deus quod esset bonum. Et factum est
      vespere et mane, dies tertius.

      Dixit autem Deus: Fiant luminaria in firmamento caeli, et dividant diem ac noctem, et sint in signa et tempora, et dies
      et annos: ut luminent terram. Et factum est ita. Fecitque Deus duo luminaria magna: luminaria maius, ut praeesset diei,
      et luminarie minus, ut praeesset nocti: et stellas. Et posuit eas in firmamento caeli, ut lucerent super terram, et
      praeessent diei ac nocti, et dividerent lucem ac tenebras. Et vidit Deus quod esset bonum. Et factum est vespere et
      mane, dies quartus.

      Dixit etiam Deus: Producant aquae reptile animae viventis, et volatile super terram sub firmamento caeli. Creavitque
      Deus cete grandia, et omnem animam viventem atque motabilem, quam produxerant aquae in species suas, et omne volatile
      secundum genus suum. Et vidit Deus quod esset bonum. Benedixitque eis, dicens: Crescite, et multiplicamini, et replete
      aquas maris: avesque multiplicentur super terram. Et factum est vespere et mane, dies quintus.

      Dixit quoque Deus: Producat terra animam viventem in genere suo: iumenta, et reptilia, et bestias terrae secundum species
      suas. Factumque est ita. Et fecit Deus quod esset bonum, et ait: Faciamus hominem ad imaginem et similitudinem nostram:
      et praesit piscibus maris, et volatilibus caeli, et bestiis, universaeque terrae, omnique reptili quod movetur in terra.
      Et creavit Deus hominem ad imaginem suam: ad imaginem Dei creavit illum, masculum et feminam creavit eos. Benedixitque
      illis Deus, et ait: Crescite et multiplicamini, et replete terram, et subiicite eam, et dominamini piscibus maris, et
      volatilibus caeli, et universis animantibus, quae moventur super terram.

      Dixitque Deus: Ecce dedi vobis omnem herbam afferentem semen super terram, et universa ligna quae habent in semetipsis
      sementum generis sui, ut sint vobis in escam: et cunctis animantibus terrae, omnique volucri caeli, et universis, quae
      moventur in terra, et in quibus est anima vivens, ut habeant ad vescendum. Et factum est ita.

      Viditque Deus cuncta quae fecerat: et erant valde bona. Et factum est vespere et mane, dies sextus.

      Igitur perfecti sunt caeli et terra, et omnis ornatus eorum. Complevitque Deus die septimo opus suum quod fecerat: et
      requievit die septimo ab universo opere quod patrarat.'
    german: 'Im Anfang schuf Gott Himmel und Erde. Die Erde aber war öde und leer, und Finsternis lag über dem Abgrund, und
      der GeistGottes schwebte über den Wassern. Und Gott sprach: „Es werde Licht!" Und es ward Licht. Und Gott sah das Licht,
      daß es gut war, und Er schied das Licht von der Finsternis. Und das Licht nannte Er Tag, die Finsternis aber nannte
      Er Nacht; und es ward Abend, und es ward Mor­gen: der erste Tag.

      Dann sprach Gott: „Es werde eine Wölbung inmitten der Was­ser, und sie scheide zwischen Wasser und Wasser." Und Gott
      machte die Wölbung, und Er schied die Wasser unter der Wöl­bung von denen über der Wöl­bung. Und so geschah es. Und
      die Wölbung nannte Gott Himmel: und es ward Abend, und es ward Morgen: der zweite Tag.

      Dann sprach Gott: „Es fließe das Wasser unter dem Himmel in eines zusammen, und es erscheine das Trockene." Und so geschah
      es. Und Gott nannte das Trockene Erde; und das gesammelte Wasser nannte Er Meer. Und Gott sah, daß es gut war. Und Er
      sprach: „Die Erde bringe grünende Pflanzen hervor, die Samen tragen, und Fruchtbäume, die Frucht tragen und ihren Sa­men
      in sich haben nach ihrer Art." Und so geschah es. Und die Erde brachte grünende Pflanzen hervor, die Samen tragen nach
      ihrer Art, und Bäume, die Früchte tragen, die ihren Samen in sich haben nach ihrer Art. Und Gott sah, daß es gut war.
      Und es ward Abend, und es ward Morgen: der dritte Tag.

      Dann sprach Gott: „Es solL Leuchten entstehn an der Wöl bung des Himmels,um zu scheiden den Tag und die Nacht und zu
      bestimmen die Zeiten und die Tage und Jahre. Sie sollen leuchten an der Wölbung des Himmels und erhellen die Erde."
      Und so geschah es. Und Gott machte die zwei großen Leuchten, die größere Leuchte, auf daß sie die Herrschaft führe über
      den Tag, und die kleinere Leuchte, auf daß sie beherrsche die Nacht, und da­zu noch die Sterne. Und Er setzte sie an
      die Wölbung des Himmels, damit sie leuchten herab auf die Erde und beherrschen den Tag und die Nacht und scheiden das
      Licht von der Finsternis. Und es ward Abend, und es ward Morgen: der vierte Tag.

      Dann sprach Gott: „Es wimmle das Wasser von lebenden Wesen, und geflügelte Tiere sollen hin­fliegen über die Erde unter
      der Wölbung des Himmels." Und Gott schuf die großen Wasser­tiere und all die lebenden und sich tummelnden Wesen, von
      denen die Gewässer wimmeln nach ihrer Art; auch alle geflügel­ten Tiere nach ihrer Art. Und Gott sah, daß es gut war;
      und Er segnete sie und sprach: „Seid fruchtbar und mehret euch und erfüllet die Wasser des Meeres; und auch die geflügelten
      Tiere sollen sich mehren auf Erden." Und es ward Abend, und es ward Morgen: der fünfte Tag.

      Dann sprach Gott: „Es bringe die Erde lebende Wesen hervor, ein jedes nach seiner Art: Vieh und kriechendes Getier und
      Wild des Feldes, ein jedes nach seiner Art." Und so geschah es. Und Gott schuf das Wild des Feldes nach seiner Art und
      Vieh und alles kriechende Getier der Erde, ein jedes nach seiner Art. Und Gott sah, daß es gut war. Und Er sprach: „Laßt
      Uns den Menschen machen nach Unserem Bilde und Gleichnis; er gebiete über die Fische des Meeres und über die geflügelten
      Tiere des Himmels und über die Tiere auf dem Land und über die ganze Erde und über alles kriechende Getier, das sich
      reget auf Erden." Und Gott schuf den Menschen nach Seinem Bilde; nach dem Bilde Gottes schuf Er ihn, als Mann und Weib
      schuf Er sie. Und Gott segnete sie und sprach: „Seid fruchtbar und mehret euch und erfüllet die Erde und macht sie euch
      Untertan; gebietet über die Fische des Meeres und über die geflügelten Tiere des Himmels die sich regen auf Erden."

      Und Gott sprach: „Seht, Ich habe euch zur Nahrung gegeben alle samentragenden Pflanzen auf Erden und alle Bäume, die
      in sich tragen den Samen nach ihrer Art; Ich habe sie zur Nahrung gegeben auch allen Tieren der Erde und allen geflügelten
      Tieren des Himmels und allem, was sich reget auf Erden und was in sich hat den Odem des Lebens." Und so geschah es.
      Und Gott sah alles, was Er gemacht, und es war alle, sehr gut. Und es ward Abend und es ward Morgen: der sechste«. Tag.

      So ward vollendet Himmel und Erde und all ihre Zier. Und Gott vollendete am siebenten Tag Sein Werk, das Er vollbracht
      und Er ruhte am siebenten Tag von all Seinem Werke, das Er geschaffen.'
  - latin: 'Oremus.

      V. Flectamus genua.

      A. Levate.'
    german: 'Lasset uns beten.

      V. Beuget die Knie!

      A. Erhebet euch!'
  - latin: 'Deus, qui mirabiliter creasti hominem, et mirabilius redemisti: da nobis, quaesumus, contra oblectamenta peccati,
      mentis ratione persistere; ut mereamur ad aeterna gaudia pervenire. Per Dominum nostrum Jesum Christum, Filium tuum:
      Qui tecum vivit et regnat in unitate Spiritus Sancti Deus: per omnia sæcula sæculorum. Amen.'
    german: 'O Gott, wunderbar hast Du den Menschen erschaffen und noch wunderbarer ihn erlöst; wir bitten Dich: laß uns den
      Lockungen der Sünde widerstehn mit der Kraft des Geistes, damit wir zu den ewigen Freuden gelangen. Durch unsern Herrn
      Jesus Christus, Deinen Sohn, der mit Dir lebt und herrscht in der Einheit des Heiligen Geistes, Gott von Ewigkeit zu
      Ewigkeit. Amen.'
node8:
  title: Prophetie II – Ex 14,24-31; 15,1
  pairs:
  - latin: 'In diebus illis: Factum est in vigilia matutina, et ecce respiciens Dominus super castra Aegyptiorum per columnam
      ignis et nubis, interfecit exercitum eorum: et subvertit rotas curruum, ferebanturque in profundum. Dixerunt ergo Aegyptii:
      Fugiamus Israelem: Dominus enim pugnat pro eis contra nos. Et ait Dominus ad Moysen: Extende manum tuam super mare,
      ut revertantur aquae ad Aegyptios super currus et equites eorum. Cumque extendisset Moyses manum contra mare, reversum
      est primo diluculo ad priorem locum: fugientibusque Aegyptiis occurrerunt aquae, et involvit eos Dominus in mediis fluctibus.
      Reversaeque sunt aquae, et operuerunt currus et equites cuncti exercitus Pharaonis, qui sequentes ingressi fuerant mare:
      nec unus quidem superfuit ex eis. Filii autem Israel perrexerunt per medium sicci maris, et aquae eis erant quasi pro
      muro a dextris et a sinistris: liberavitque Dominus in die illa Israel de manu Aegyptiorum. Et viderunt Aegyptios mortuos
      super littus maris, et manum magnam. quam exercuerat Dominus contra eos: timuitque populus Dominum, et crediderunt Domino,
      et Moysi servo eius. Tunc cecinit Moyses, et filii Israel carmen hoc Domino, et dixerunt:'
    german: 'In jenen Tagen schaute der Herr zur Zeit der Morgenwache aus der Säule des Feuers und der Wolke auf das Lager
      der Ägyp­ter und vernichtete ihr Heer; und von den Wagen ließ Er ab­springen die Räder, und sie fielen zu Boden. Da
      sprachen die Ägyp­ter: „Lasset uns fliehen vor Is­rael, denn der Herr streitet für sie wider uns." Und es sprach der
      Herr zu Moses: „Strecke aus dei­ne Hand über das Meer, damit das Wasser über die Ägypter her­einbreche, über ihre Wagen
      und Reiter." Und Moses streckte seine Hand aus gegen das Meer, und es flutete am frühen Morgen zurück an seinen früheren
      Ort. Nun wollten die Ägypter fliehen, aber das Wasser kam ihnen entgegen, und der Herr begrub sie mitten im Meere. Und
      das Wasser flutete zurück und bedeckte die Wagen und Reiter vom ganzen Heere des Pharao, das sie verfolgt hatte und
      hineingezogen war in das Meer; und nicht einer von ihnen blieb übrig. Die Söhne Israels aber zogen mitten durch das
      trockene Meeresbett, und das Was­ser stand wie eine Mauer zu ihrer Rechten und Linken. So rettete der Herr an diesem
      Tage Israel aus der Hand der Ägypter. Und sie sahen tot die Ägypter am Ufer des Meeres, und sie erkann­ten die Hand
      des Herrn, die sich mächtig erwiesen an ihnen. Und es fürchtete das Volk den Herrn und glaubte an den Herrn und Seinen
      Diener, den Moses. Und Moses sang mit den Söhnen Is­raels dem Herrn dieses Lied:'
  - latin: 'Cantemus Domino: gloriose enim honorificatus est: equum et ascensorum proiecit in mare: adiutor, et protector
      factus est mihi in salutem. V. Hic Deus meus, et honorificabo eum: Deus patris mei, et exaltabo eum. V. Dominus conterens
      bella: Dominus nomen est illi.'
    german: '1. Ch Laßt uns singen dem Herrn, denn machtvoll hat Er Sich kund­getan: / Roß und Reiter warf Er ins Meer. 2.
      Ch Er ist mein Hel­fer geworden zum Heile, / Er ist mein Beschützer. 1 Ch Er ist mein Gott, Ihn will ich preisen;/der
      Gott meines Vaters, Ihn will ich erheben. 2. Ch Der Herr macht zunichte den Krieg;/Herr ist sein Name.'
  - latin: 'Oremus.

      V. Flectamus genua.

      A. Levate.'
    german: 'Lasset uns beten.

      V. Beuget die Knie!

      V. Erhebet euch!'
  - latin: 'Deus, cuius antiqua miracula etiam nostris saeculis coruscare sentimus: dum quod uni populo, a persecutione Aegyptiaca
      liberando, dexterae tuae potentia contulisti, id in salutem gentium per aquam regenerationis operaris: praesta; ut in
      Abrahae filios, et in Israeliticam dignitatem, totius mundi transeat plenitudo. Per Dominum nostrum, Iesum Christum,
      Filium tuum, qui tecum vivit et regnat in unitate Spiritus Sancti, Deus, per omnia saecula saeculorum. R. Amen.'
    german: O Gott, Deine uralten Wunder sehrn wir noch in unseren Zeiten erstrahlen; was Dein mächtiger Arm an dem einen
      Volke getan, als Du es vor den ägyptischen Verfolgern gerettet, das wirkest Du zum Heile der Heidenvölker durch das
      Wasser der Wiedergeburt; gewähre, daß die Menschen der ganzen Welt eingehn dürfen zu der Kindschaft Abrahams und zur
      Würde Israels, Deines Volkes. Durch unsern Herrn Jesus Christus, Deinen Sohn, der mit Dir lebt und herrscht in der Einheit
      des Heiligen Geistes, Gott von Ewigkeit zu Ewigkeit. Amen.
node9:
  title: Prophetie III – Jes 4,2-6
  pairs:
  - latin: 'In die illa erit germen Domini in magnificentia, et gloria, et fructus terrae sublimis, et exultatio his, qui
      salvati fuerint de Israel. Et erit: Omnis qui relictus fuerit in Sion, et residuus in Ierusalem, sanctus vocabitur,
      omnis qui scriptus est in vita in Ierusalem. Si abluerit Dominus sordes filiarum Sion, et sanguinem Ierusalem laverit
      de medio eius, in spiritu iudicii, et spiritu ardoris. Et creabit Dominus super omnem locum montis Sion, et ubi invocatus
      est, nubem per diem, et fumum, et splendorem ignis flammantis in nocte: super omnem enim gloriam protectio. Et tabernaculum
      erit in umbraculum diei ab aestu, et in securitatem, et absconsionem a turbine, et a pluvia.'
    german: 'An jenem Tage wird groß sein und ruhmvoll der Sproß des Herrn, und die Frucht des Lan­des wird herrlich stehn,
      und Froh­locken wird zuteil jenen aus Israel, die gerettet sind. Und je­der, der dann übrigbleibt in Sion und zurückbleibt
      in Jerusalem, wird heilig genannt: jeder, der eingeschrieben ward zum Le­ben in Jerusalem. Wenn der Herr dann abgewaschen
      den Schmutz der Töchter Sions und getilgt die Blutschuld Jerusalems durch den Geist des Gerichtes und den Geist der
      sengenden Gluten, dann wird der Herr über den ganzen Berg Sion und überall, wo Er angeru­fen wird, eine schattige Wolke
      schaffen bei Tag und flammen­den Feuerschein in der Nacht. Und über alle Herrlichkeit wird Sein Schutz sich breiten.
      Und ein Gezelt wird sein als Schatten ge­gen die Hitze bei Tag und als Zuflucht und Deckung gegen Unwetter und Regen.'
  - latin: 'Vinea facta est dilecto in cornu, in loco uberi. V Et maceriam circumdedit, et circumfodit: et plantavit vineam
      Sorec: et aedificavit turrim in medio eius. V Et torcular fodit in ea: vinea enim Domini Sabaoth, domus Israel est.'
    german: 1. Ch Ein Weinberg war meinem Geliebten zu eigen / oben auf fruchtbarer Höhe. 2. Ch Und Er zog um ihn eine Mauer,
      / Er grub ihn um und pflanzte Reben von Sorek. 1. Ch In seine Mitte baute Er einen Turm, / und Er grub eine Kelter.
      2. Ch Der Weinberg des Herrn der himmlischen Heere, es ist das Haus Israel.
  - latin: 'Oremus.

      V. Flectamus genua.

      V. Levate.'
    german: 'Lasset uns beten.

      V. Beuget die Knie!

      V. Erhebet euch!'
  - latin: 'Deus, qui in omnibus Ecclesiae tuae filiis sanctorum prophetarum voce manifestasti, in omni loco dominationis
      tuae, satorem te bonorum seminum, et electorum palmitum esse cultorem: tribue populis tuis, qui et vinearum apud te
      nomine censentur, et segetum; ut, spinarum et tribulorum squalore resecato, digna efficiantur fruge fecundi. Per Dominum
      nostrum Iesum Christun Filium tuum, qui tecum vivit et regnat in unitate Spiritus Sancti Deus, per omnia saecula saeculorum.'
    german: 'O Gott, allen Kindern Deiner Kirche hast Du dieses verkündet durch den Mund Deiner heiligen Propheten: An jedem
      Ort Deiner Herrschaft bist Du der Sämann, der sät den guten Samen, und bist der Winzer, der pflanzet erlesene Reben.
      Verleihe Deinen Völkern, die Dir Weinberg und Saatfeld bedeuten, daß sie ausroden die wuchernden Disteln und Dornen
      und daß sie gute Früchte tragen in Fülle. Durch unsern Herrn Jesus Christus, Deinen Sohn, der mit Dir lebt und herrscht
      in der Einheit des Heiligen Geistes, Gott von Ewigkeit zu Ewigkeit. Amen.'
node10:
  title: Prophetie IV – Dtn 31,22-30
  pairs:
  - latin: 'In diebus illis: Scripsit ergo Moyses canticum et docuit filios Israel. Praecepitque Dominus Iosue filio Nun et
      ait: Confortare, et esto robustus: tu enim introduces filios Israel in terram, quam pollicitus sum, et ego ero tecum.
      Postquam ergo scripsit Moses verba legis huius in volumine, atque conplevit: praecepit Levitis, qui portabant arcam
      foederis Domini dicens: Tollite librum istum, et ponite eum in latere arcae foederis Domini Dei vestri: ut sit ibi contra
      te in testimonium. Ego enim scio contentionem tuam, et cervicem tuam durissimam. Adhuc vivente me, et ingrediente vobiscum,
      semper contentiose egistis contra Dominum: quanto magis cum mortuus fuero? Congregate ad me omnes maiores natu per tribus
      vestras, atque doctores, et loquar audientibus eis sermones istos, et invocabo contra eos caelum et terram. Novi enim
      quod post mortem meam inique agetis, et declinabitis cito de via, quam praecepi vobis: et occurrent vobis mala in extremo
      tempore, quando feceritis malum in conspectu Domini, ut irritetis eum per opera manuum vestrarum. Locutus est ergo Moyses,
      audiente universo coetu Israel, verba carminis huius, et ad finem usque conplevit:'
    german: 'In jenen Tagen schrieb Moses ei Lied auf und lehrte es die Söhne Israels. Und der Herr gebot Josue dem Sohne
      des Nun, und Er sprach: „Sei mannhaft und stark, denn du sollst die Söhne Israels einführen in das Land, das ihnen verheißen,
      und Ich selber werde mit dir sein. Da nun Moses die Worte dieses Gesetzes in eine Buchrolle geschrieben und vollendet
      hatte, da gebot er den Leviten, die die Bundeslade des Herrn trugen,und sprach: „Nehmet das Buch mit diesem Gesetze
      und legt es nieder an der Seite der Bundeslade des Herrn, eures Gottes, damit es dort zum Zeugnis diene wider dich.
      Denn ich kenne deine Widerspenstigkeit und deinen störrischen Nacken, Schon jetzt, da ich noch am Leben bin und bei
      euch weile, seid ihr allezeit widerspenstig gewesen gegen den Herrn; um wieviel mehr erst, wenn ich gestorben bin! Versammelt
      alle Ältesten eurer Stämme und eure Lehrer zu mir, daß ich vor ihnen diese Worte verkünde und Himmel und Erde gegen
      sie anrufe als Zeu­gen. Denn ich weiß: ihr werdet nach meinem Tode schlecht han­deln und schnell vom Wege ab­weichen,
      den ich euch gewiesen. Es wird euch Unglück treffen in der letzten Zeit, wenn ihr böse handelt vor den Augen des Herrn,
      indem ihr durch das Werk eurer Hände Ihn erregen werdet zum Zorne." Und Moses trug der ganzen Gemeinde Israels die Worte
      dieses Liedes vor bis zu Ende:'
  - latin: 'Attende, caelum, et loquar: et audiat terra verba ex ore meo. V. Exspectetur sicut pluvia eloquium meum: et descendant
      sicut ros verba mea, sicut imber super gramina. V. Et sicut nix super fenum: quia nomen Domini invocabo. V. Date magnitudinem
      Deo nostro: Deus, vera opera eius, et omnes viae eius iudicia. V. Deus fidelis, in quo non est iniquitas: iustus et
      sanctus Dominus.'
    german: Ch Horche auf, o Himmel, ich rede! / Erde, vernimm die Worte meines Mundes; 2. Ch Meine Rede nimm auf wie den
      Regen,/niederfließen sollen meine Worte wie Tau; 1. Ch Gleich­wie Regen auf sprossende Kräu­ter / und wie Schnee auf
      welken­des Laub; / denn anrufen will ich den Namen des Herrn. 2. Ch Unserem Gott gebet Ehre! / Gottes Werke sind wahr,
      / gerecht sind all Seine Wege. 1. u. 2. Ch Gott ist getreu, in Ihm ist kein Trug; / heilig ist der Herr und gerecht.
  - latin: 'Oremus:

      V. Flectamus genua.

      V. Levate.'
    german: 'Lasset uns beten.

      V. Beuget die Knie!

      V. Erhebet euch!'
  - latin: 'Deus, celsitudo humilium et fortitudo rectorum, qui per sanctum Moysen puerum tuum, ita erudire populum tuum sacri
      carminis tui decantatione voluisti, ut illa legis iteratio fieret etiam nostra directio: excita in omnem iustificatarum
      gentium plenitudinem potentiam tuam, et da laetitiam, mitigando terrorem; ut, omnium peccatis tua remissione deletis,
      quod denuntiatum est in ultionem, transeat in salutem. Per Dominum nostrum, Iesum Christum, Filium tuum, qui tecum vivit
      et regnat in unitate Spiritus Sancti Deus, per omnia saecula saeculorum.'
    german: O Gott, Du erhöhest die Nied­rigen, Du stärkest die Gerech­ten; Du wolltest, daß Moses, Dein heiliger Knecht,
      durch den Vortrag dieses heiligen Liedes Dein Volk so belehre, daß jenes Wiederholen des Gesetzes auch uns den Weg weise.
      Entbiete Deine Macht für alle Völker, die gerechtfertigt sind; sänftige die Furcht und gib ihnen Freude; tilge verzeihend
      all ihre Sünden, und das Strafgericht, mit dem Du ihnen gedroht, wandle in Segen. Durch unsern Herrn Jesus Christus,
      Deinen Sohn, der mit Dir lebt und herrscht in der Einheit des Heiligen Geistes, Gott von Ewigkeit zu Ewigkeit. Amen.
